# inventory/group_vars/all.yml 
ansible_become: true
ansible_user: "ubuntu"
kube_version: "1.32.10-1.1"
kube_repo_version: "1.32"
kube_image_version: "1.32.10"
pod_network_cidr: "10.244.0.0/16"
service_cidr: "10.96.0.0/12"
floating_ip: 10.13.37.43    # Variable for the VIP
control_plane_port: 6443
control_plane_endpoint: "{{ floating_ip }}:{{ control_plane_port }}"  # VIP (haproxy/keepalived) 
containerd_socket: "/run/containerd/containerd.sock"
kubeadm_artifact_dir: "/tmp/kubeadm"
keepalived_interface: "ens3"
deploy_path: "../../../microservices-demo/release/kubernetes-manifests.yaml"

containerd_config_path: /etc/containerd/config.toml
